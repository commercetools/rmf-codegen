on:
  - workflow_dispatch
  - push

name: CI

permissions: {}

jobs:
  test:
    name: Build and test

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: Build and Release
        env:
          GRADLE_OPTS: "-Dorg.gradle.internal.http.connectionTimeout=120000 -Dorg.gradle.internal.http.socketTimeout=120000"
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Gradle build attempt ${attempt}/3"
            if ./gradlew --no-daemon clean check shadowJar; then
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              echo "Build failed, retrying in 15 seconds..."
              sleep 15
            fi
          done

          echo "Build failed after 3 attempts."
          exit 1

      - run: ./scripts/install_local.sh
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: test
          persist-credentials: 'false'

      - name: Test validate
        continue-on-error: true
        run: rmf-codegen validate -f GITHUB -r ./api-spec/ruleset.xml ./api-spec/api.raml
        working-directory: test
  test_node:
    name: Build npm package

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build npm package
        working-directory: node/rmf-codegen
        run: yarn build

      - name: Run npm package
        working-directory: node/rmf-codegen
        run: node bin/rmf-codegen.js
